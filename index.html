<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luftklappen Rechner</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0056b3">

    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #0056b3; margin-top: 0; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.3s; }
        .btn-save { background-color: #28a745; color: white; margin-bottom: 20px; }
        .btn-delete { background: none; border: none; padding: 5px; font-size: 1.2em; color: #dc3545; width: auto; margin: 0; display: inline-block; cursor: pointer; }
        .result-box { background-color: #e9ecef; padding: 15px; border-radius: 6px; text-align: center; margin: 20px 0; font-size: 1.2em; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.8em; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; vertical-align: middle; }
        th { background-color: #0056b3; color: white; }
        .table-container { overflow-x: auto; }
        
        /* Neues Design für Radio-Buttons */
        .radio-group { display: flex; gap: 20px; align-items: center; padding: 5px 0; }
        .radio-group label { display: inline; font-weight: normal; margin-bottom: 0; cursor: pointer; font-size: 16px; }
        .radio-group input[type="radio"] { width: auto; transform: scale(1.3); margin-right: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Luftklappen Optimierung</h2>
    
    <div class="input-group">
        <label>Innen-Temperatur (°C)</label>
        <input type="number" id="inT" step="0.1" oninput="berechneOptimum()">
    </div>
    <div class="input-group">
        <label>Innen-Feuchtigkeit (%)</label>
        <input type="number" id="inF" step="1" oninput="berechneOptimum()">
    </div>
    <div class="input-group">
        <label>Außen-Temperatur (°C)</label>
        <input type="number" id="outT" step="0.1" oninput="berechneOptimum()">
    </div>
    <div class="input-group">
        <label>Außen-Feuchtigkeit (%)</label>
        <input type="number" id="outF" step="1" oninput="berechneOptimum()">
    </div>

    <!-- NEU: Entfeuchter -->
    <div class="input-group">
        <label>Entfeuchter</label>
        <div class="radio-group">
            <input type="radio" id="entfEin" name="entfeuchter" value="Ein" checked> <label for="entfEin">Ein</label>
            <input type="radio" id="entfAus" name="entfeuchter" value="Aus"> <label for="entfAus">Aus</label>
        </div>
    </div>

    <!-- NEU: Luftquelle -->
    <div class="input-group">
        <label>4 Außenluftklappen auf:</label>
        <div class="radio-group">
            <input type="radio" id="luftDach" name="luftquelle" value="Dachluft" checked> <label for="luftDach">Dachluft</label>
            <input type="radio" id="luftUm" name="luftquelle" value="Umluft"> <label for="luftUm">Umluft</label>
        </div>
    </div>

    <div class="result-box" id="resultDisplay">
        Bitte alle Werte eintragen...
    </div>

    <div class="input-group">
        <label>Tatsächlich eingestellte Dachluftklappe (%)</label>
        <input type="number" id="actualVal" placeholder="z.B. 35">
    </div>

    <button class="btn-save" onclick="speichereDaten()">Datensatz Speichern</button>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
        <h3 style="margin: 0;">Historie</h3>
        <button onclick="exportiereCSV()" style="width: auto; padding: 8px 12px; background-color: #6c757d; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em;">
            📥 Excel Export
        </button>
    </div>
    <div class="table-container">
        <table id="historyTable">
            <thead>
                <tr>
                    <th>T_in</th>
                    <th>F_in</th>
                    <th>T_out</th>
                    <th>F_out</th>
                    <th>Entf.</th>
                    <th>Quelle</th>
                    <th>Opt.</th>
                    <th>Ist</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- Daten werden hier eingefügt -->
            </tbody>
        </table>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
